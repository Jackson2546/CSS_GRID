<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    body {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .grid-container {
      display: grid;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 30px;
    }

    .card {
      background-color: #fff;
      text-align: center;
      height: 270px;
      width: 100%;
      border: 1px solid rgb(95, 81, 81);
      box-shadow: 0 8px 12px rgba(0, 0, 0, 0.4);
      border-radius: 10px;

    }
    img {
      width: 100%;
      height: 120px;
      display: block;
      object-fit: cover;
      border-top-left-radius: 10px;
      border-top-right-radius: 10px;
    }

    .card p img {
      height: 25px;
      width: 25px;
      border-radius: 50%;
      margin-left: 15px;
      display: inline-block;
    }

    .card p {
      color: grey;
      margin-bottom: 15px;
    }

    .card button {
      background: rgba(7, 109, 217, 0.724);
      color: #fff;
      border: none;
      padding: 10px 15px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    .card button:hover {
      background: rgb(7, 151, 187);
    }

    .card h3 {
      margin: 10px 0 5px;
    }
  </style>
  <body>
    <div class="grid-container">
      <div class="card">
        <img src="../Jackson.jpeg" alt="paka" ; />
        <h3>Oliver</h3>
        <p>
          <img src="../Jackson.jpeg" alt="paka" />
          2 matual friend
        </p>
        <button>Add Friends</button>
      </div>

      <div class="card">
        <img src="../paka 2.jpg" alt="paka" ; />
        <h3>Mini</h3>
        <p>
          <img src="../paka 2.jpg" alt="paka" />
          3 matual friend
        </p>
        <button>Add Friends</button>
      </div>
      <div class="card">
        <img src="../paka 3.jpg" alt="paka" ; />
        <h3>Mini</h3>
        <p>
          <img src="../paka 3.jpg" alt="paka" />
          3 matual friend
        </p>
        <button>Add Friends</button>
      </div>
    </div>
  </body>
</html>
